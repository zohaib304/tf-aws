<!-- website/index.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Terraform Site</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0c1a2e 0%, #1a3a5c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 60px 80px;
            text-align: center;
            max-width: 600px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
        }

        .badge {
            background: #dbeafe;
            color: #2563eb;
            font-size: 14px;
            font-weight: bold;
            padding: 6px 16px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 24px;
        }

        h1 {
            color: #1a3a5c;
            font-size: 36px;
            margin-bottom: 16px;
        }

        p {
            color: #374151;
            font-size: 18px;
            line-height: 1.6;
        }

        .footer {
            margin-top: 32px;
            font-size: 14px;
            color: #9ca3af;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="badge">☁ Deployed with Terraform</div>
        <h1>It Works 🎉</h1>
        <p>This page is served via CloudFront from a private S3 bucket.</p>
        <p>Nobody can access S3 directly — only CloudFront can.</p>
        <div class="footer">tf-aws-s3-static-site lab</div>
    </div>
</body>

</html>
